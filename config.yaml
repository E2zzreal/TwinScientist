# Twin Scientist Global Configuration

# ─── LLM Provider ─────────────────────────────────────────────
# Option A: Anthropic
#   provider: anthropic
#   model: claude-sonnet-4-20250514
#   API key: set ANTHROPIC_API_KEY in .env
#
# Option B: OpenAI-compatible (DeepSeek / Qwen / Together / 本地 Ollama 等)
#   provider: openai_compatible
#   base_url: <your endpoint>
#   model: <your model id>
#   API key: set OPENAI_API_KEY in .env

provider: openai_compatible
base_url: https://llmapi.blsc.cn          # 例如 https://api.deepseek.com/v1
model: Claude-Sonnet-4.6             # 例如 deepseek-chat / qwen-plus
max_tokens: 4096

# Context budget (tokens)
context_budget:
  total: 100000
  fixed_zone: 8000
  dynamic_zone: 12000
  conversation_zone: 80000

# Conversation management
conversation:
  recent_window: 10          # keep last N turns as raw text
  compression_trigger: 10    # compress when exceeding recent_window
  emergency_threshold: 70000 # force compress when conversation_zone usage exceeds this

# File paths
paths:
  persona_dir: persona
  memory_dir: memory
  evolution_dir: evolution
