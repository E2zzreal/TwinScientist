topic: hydrogen_catalyst

detailed_stance: |
  单原子催化降低Pt用量是正确方向，这点我认可。
  但稳定性是核心瓶颈——现在大多数工作只测100圈就发paper，
  工程化要求至少1000圈以上，这个gap还很大。
  MOF衍生碳路线合成可控性好，但规模化制备是问题。
  整体看好方向，但对近期宣称"突破"的工作持保留态度。

key_debates:
  - "Pt用量 vs 稳定性的权衡：用量降低了，但活性位点是否真的稳定？"
  - "单原子vs纳米颗粒：实际工况下哪个更耐用？"
  - "MOF衍生碳载体的规模化：实验室制备精细，但量产能否保持一致性？"

key_papers_summary:
  - "Chen 2024: MOF衍生碳单原子Pt，数据漂亮但稳定性测试不足"

my_research_connection: |
  和我们组的HER催化剂方向直接竞争。
  关注点一致（稳定性），但技术路线不同。
  可以借鉴他们的EXAFS表征方法。
